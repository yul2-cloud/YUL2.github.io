                ],
                correct: 2,
                analysis: "A：每次量约100ml，5min内完成 → 量少、速度过快，易致胃肠不适<br>B：每次量约200ml，10min内完成 → 速度偏快，易腹胀腹泻<br>C：每次量约200ml，15min内完成 → 临床标准方案，适配胃肠道耐受<br>D：每次量约300ml，3min内完成 → 速度过快，易引发恶心呕吐"
            },
            {
                id: 69,
                title: "患者，男，62岁，食管癌晚期，该病主要转移途径及转移部位为：",
                options: [
                    "A. 淋巴转移，食管旁淋巴结",
                    "B. 淋巴转移，锁骨上淋巴结",
                    "C. 血行转移，腋窝淋巴结",
                    "D. 血行转移，膈下淋巴结"
                ],
                correct: 1,
                analysis: "A：淋巴转移，食管旁淋巴结 → 早期转移部位，非晚期主要部位<br>B：淋巴转移，锁骨上淋巴结 → 食管癌主要为淋巴转移，晚期常转移至锁骨上淋巴结（左侧多见）<br>C：血行转移，腋窝淋巴结 → 血行转移为晚期少见途径，腋窝淋巴结非常见转移部位<br>D：血行转移，膈下淋巴结 → 血行转移非主要途径，膈下淋巴结转移少见"
            }
        ];

        // 全局变量
        let currentIndex = 0; // 当前题目索引
        let wrongQuestions = JSON.parse(localStorage.getItem("wrongQuestions")) || []; // 错题列表（本地存储）
        let answeredCount = 0; // 已答题数
        let correctCount = 0; // 答对题数

        // 初始化页面
        function init() {
            renderQuestion(currentIndex);
            bindEvents();
        }

        // 渲染当前题目
        function renderQuestion(index) {
            if (index >= questionBank.length) {
                showResult();
                return;
            }
            const question = questionBank[index];
            const questionArea = document.getElementById("question-area");
            questionArea.innerHTML = `
                <div class="question-card">
                    <div class="question-title">${question.id}. ${question.title}</div>
                    <ul class="option-list" id="option-list-${question.id}">
                        ${question.options.map((option, idx) => `
                            <li class="option-item" data-index="${idx}">${option}</li>
                        `).join("")}
                    </ul>
                    <div class="analysis" id="analysis-${question.id}">${question.analysis}</div>
                    <div class="control-btn">
                        <button class="show-analysis" data-id="${question.id}">查看解析</button>
                        <button class="next-question">下一题</button>
                    </div>
                </div>
            `;
            // 绑定选项点击事件
            document.querySelectorAll(`#option-list-${question.id} .option-item`).forEach(item => {
                item.addEventListener("click", function() {
                    const selectedIdx = parseInt(this.dataset.index);
                    const correctIdx = question.correct;
                    // 禁用所有选项
                    document.querySelectorAll(`#option-list-${question.id} .option-item`).forEach(opt => {
                        opt.style.pointerEvents = "none";
                    });
                    // 标记对错
                    if (selectedIdx === correctIdx) {
                        this.classList.add("correct");
                        correctCount++;
                    } else {
                        this.classList.add("wrong");
                        // 标记正确选项
                        document.querySelectorAll(`#option-list-${question.id} .option-item`)[correctIdx].classList.add("correct");
                        // 添加到错题本
                        addToWrongList(question.id);
                    }
                    answeredCount++;
                });
            });
        }

        // 添加到错题本
        function addToWrongList(questionId) {
            const isAlreadyInWrong = wrongQuestions.some(q => q.id === questionId);
            if (!isAlreadyInWrong) {
                const question = questionBank.find(q => q.id === questionId);
                wrongQuestions.push(question);
                localStorage.setItem("wrongQuestions", JSON.stringify(wrongQuestions));
            }
        }

        // 显示解析
        function showAnalysis(questionId) {
            const analysis = document.getElementById(`analysis-${questionId}`);
            analysis.style.display = analysis.style.display === "block" ? "none" : "block";
        }

        // 显示结果
        function showResult() {
            const resultArea = document.getElementById("result-area");
            resultArea.style.display = "block";
            const accuracy = (correctCount / answeredCount * 100).toFixed(2);
            resultArea.innerHTML = `
                <p>答题完成！共${questionBank.length}题，已答${answeredCount}题，答对${correctCount}题</p>
                <p>正确率：${accuracy}%</p>
                <p>错题数：${wrongQuestions.length}题（可点击“查看错题本”复习）</p>
                <button onclick="resetQuiz()" style="margin-top:10px;padding:8px 15px;background:#409eff;color:white;border:none;border-radius:5px;cursor:pointer;">重新答题</button>
            `;
        }

        // 渲染错题本
        function renderWrongList() {
            const wrongListArea = document.getElementById("wrong-list-area");
            const wrongQuestionsEl = document.getElementById("wrong-questions");
            wrongListArea.style.display = "block";
            if (wrongQuestions.length === 0) {
                wrongQuestionsEl.innerHTML = "<p>暂无错题</p>";
                return;
            }
            wrongQuestionsEl.innerHTML = wrongQuestions.map(question => `
                <div class="question-card">
                    <div class="question-title">${question.id}. ${question.title}</div>
                    <ul class="option-list">
                        ${question.options.map((option, idx) => `
                            <li class="option-item ${idx === question.correct ? 'correct' : ''}">${option}</li>
                        `).join("")}
                    </ul>
                    <div class="analysis" style="display:block">${question.analysis}</div>
                </div>
            `).join("");
        }

        // 重置答题
        function resetQuiz() {
            currentIndex = 0;
            answeredCount = 0;
            correctCount = 0;
            document.getElementById("result-area").style.display = "none";
            renderQuestion(currentIndex);
        }

        // 绑定事件
        function bindEvents() {
            // 查看解析按钮
            document.addEventListener("click", function(e) {
                if (e.target.classList.contains("show-analysis")) {
                    const questionId = e.target.dataset.id;
                    showAnalysis(questionId);
                }
            });

            // 下一题按钮
            document.addEventListener("click", function(e) {
                if (e.target.classList.contains("next-question")) {
                    currentIndex++;
                    renderQuestion(currentIndex);
                }
            });

            // 查看错题本
            document.getElementById("show-wrong-btn").addEventListener("click", function() {
                renderWrongList();
            });

            // 清空错题
            document.getElementById("reset-wrong-btn").addEventListener("click", function() {
                if (confirm("确定清空错题本吗？")) {
                    wrongQuestions = [];
                    localStorage.removeItem("wrongQuestions");
                    renderWrongList();
                }
            });
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
